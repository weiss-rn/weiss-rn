name: Update Profile README Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create assets directory
        run: mkdir -p assets

      - name: Download GitHub Stats card
        run: |
          curl -s \
            "https://github-readme-stats-five-bay-26.vercel.app//api?username=weiss-rn&show_icons=true&include_all_commits=true&count_private=true" \
            -o assets/stats.svg

      - name: Download Top Languages card
        run: |
          curl -s \
            "https://github-readme-stats-five-bay-26.vercel.app/api/top-langs?username=weiss-rn&layout=compact&langs_count=8&count_private=true" \
            -o assets/top-langs.svg

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/top-langs.svg
          git commit -m "chore: update profile stat cards [skip ci]" || echo "No changes to commit"
          git push
