name: Update Profile README Stats

on:
  schedule:
    - cron: "0 3 * * *"  # Every day at 3:00 AM UTC
  workflow_dispatch:       # Manual trigger anytime

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=weiss-rn
            &show_icons=true
            &include_all_commits=true
            &count_private=true
            &show=prs_merged,prs_merged_percentage
          path: assets/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Top Languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=weiss-rn
            &layout=compact
            &langs_count=8
            &count_private=true
          path: assets/top-langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/top-langs.svg
          git commit -m "chore: update profile stat cards [skip ci]" || exit 0
          git push
